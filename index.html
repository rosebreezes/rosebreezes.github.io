</section>

<script>
  const projects = [
    { id:1,  title:"Ekonika × Cosmoscow", cat:"Commercial",  year:"2024" },
    { id:2,  title:"Visual Research",      cat:"Photography", year:"2024" },
    { id:3,  title:"Still-life Study",     cat:"Art Work",    year:"2023" },
    { id:4,  title:"Prisakaru",            cat:"Branding",    year:"2023" },
    { id:5,  title:"Object No. 7",         cat:"Still Life",  year:"2023" },
    { id:6,  title:"Soft Geometry",        cat:"Photography", year:"2022" },
    { id:7,  title:"Stone & Gold",         cat:"Commercial",  year:"2022" },
    { id:8,  title:"White Matter",         cat:"Art Work",    year:"2022" },
    { id:9,  title:"Archive 001",          cat:"Photography", year:"2021" },
    { id:10, title:"Form Studies",         cat:"Branding",    year:"2021" },
    { id:11, title:"Light Residue",        cat:"Art Work",    year:"2021" },
    { id:12, title:"Material Surface",     cat:"Still Life",  year:"2020" },
  ];

  const grid = document.getElementById('grid');

  projects.forEach((p, i) => {
    const n = String(i + 1).padStart(2, '0');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <span class="card-no">${n}.</span>
      <div class="card-thumb">
        <img src="https://picsum.photos/seed/port${p.id}a/600/800" alt="${p.title}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-sub">${p.cat} — ${p.year}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      location.href = `project.html?id=${p.id}`;
    });
    grid.appendChild(card);
  });

  const cardObserver = new IntersectionObserver(
    entries => entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        cardObserver.unobserve(e.target);
      }
    }),
    { threshold: 0.06 }
  );
  document.querySelectorAll('.card').forEach(c => cardObserver.observe(c));

  const wrap = document.getElementById('grid');
  const cards = Array.from(wrap.querySelectorAll('.card'));

  const ghostTitles = [
    projects[1].title,
    projects[4].title,
    projects[8].title,
  ];
  const sides = ['from-left', 'from-right', 'from-left'];

  ghostTitles.forEach((txt, gi) => {
    const anchorCard = cards[Math.min((gi + 1) * 4 - 1, cards.length - 1)];

    const el = document.createElement('div');
    el.className = `scroll-title ${sides[gi]}`;
    el.textContent = txt;

    const spacer = document.createElement('div');
    spacer.style.cssText = 'grid-column: 1 / -1; height: 0; position: relative; overflow: visible;';
    spacer.appendChild(el);

    el.style.top = '-0.6em';

    anchorCard.after(spacer);

    const titleObserver = new IntersectionObserver(
      entries => entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          titleObserver.unobserve(e.target);
        }
      }),
      { threshold: 0 }
    );
    titleObserver.observe(el);
  });
</script>
